version: "3.9"

services:
  bot:
    build: .
    container_name: grants-bot
    restart: unless-stopped
    env_file: .env
    depends_on:
      bot-postgres:
        condition: service_healthy
      bot-redis:
        condition: service_healthy
    networks:
      - bot-internal
      - gbakery  # shared with ERP — for direct ERP DB access

  bot-postgres:
    image: postgres:16-alpine
    container_name: grants-bot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${BOT_DB_NAME:-grantsbot}
      POSTGRES_USER: ${BOT_DB_USER:-botuser}
      POSTGRES_PASSWORD: ${BOT_DB_PASS}
    volumes:
      - bot_pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${BOT_DB_USER:-botuser} -d ${BOT_DB_NAME:-grantsbot}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - bot-internal

  bot-redis:
    image: redis:7-alpine
    container_name: grants-bot-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - bot_redis:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - bot-internal

volumes:
  bot_pgdata:
  bot_redis:

networks:
  bot-internal:
    driver: bridge
  gbakery:
    external: true   # existing ERP docker network — check with: docker network ls
