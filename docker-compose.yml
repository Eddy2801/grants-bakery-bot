version: "3.9"

services:
  bot:
    build: .
    container_name: grants-bot
    restart: unless-stopped
    env_file: .env
    depends_on:
      bot-postgres:
        condition: service_healthy
    networks:
      - bot-internal
      - n8n_mqtt_net  # shared with ERP — postgres + redis

  bot-postgres:
    image: postgres:16-alpine
    container_name: grants-bot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${BOT_DB_NAME:-grantsbot}
      POSTGRES_USER: ${BOT_DB_USER:-botuser}
      POSTGRES_PASSWORD: ${BOT_DB_PASS}
    volumes:
      - bot_pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${BOT_DB_USER:-botuser} -d ${BOT_DB_NAME:-grantsbot}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - bot-internal

volumes:
  bot_pgdata:

networks:
  bot-internal:
    driver: bridge
  n8n_mqtt_net:
    external: true   # existing ERP docker network (postgres, redis, gbakery-web)
